<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coded Vibe Quiz (VCVQ)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Landing Page -->
        <div id="landing-page" class="page active">
            <div class="container">
                <header>
                    <h1 data-translate="app-title">🎯 Vibe Coded Vibe Quiz</h1>
                    <p class="subtitle" data-translate="app-subtitle">Real-time multiplayer quiz game</p>
                </header>
                
                <div class="language-selector">
                    <label for="language" data-translate="language-label">Language:</label>
                    <select id="language">
                        <option value="swedish">🇸🇪 Svenska</option>
                        <option value="english">🇬🇧 English</option>
                    </select>
                </div>

                <div class="quiz-setup">
                    <div class="topic-input">
                        <label for="topic" data-translate="topic-label">Choose a topic for your quiz:</label>
                        <input type="text" id="topic" data-translate-placeholder="topic-placeholder" placeholder="t.ex., Svensk historia, Rymdutforskning, Matlagning..." required>
                    </div>

                    <div class="game-settings">
                        <div class="setting-group">
                            <label for="player-count" data-translate="player-count-label">Number of players:</label>
                            <select id="player-count">
                                <option value="2" data-translate="2-players">2 Players</option>
                                <option value="3" data-translate="3-players">3 Players</option>
                                <option value="4" data-translate="4-players">4 Players</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label for="question-count" data-translate="question-count-label">Number of questions:</label>
                            <select id="question-count">
                                <option value="5" data-translate="5-questions">5 Questions</option>
                                <option value="10" selected data-translate="10-questions">10 Questions</option>
                                <option value="15" data-translate="15-questions">15 Questions</option>
                                <option value="20" data-translate="20-questions">20 Questions</option>
                                <option value="25" data-translate="25-questions">25 Questions</option>
                            </select>
                        </div>
                    </div>

                    <button id="generate-btn" class="btn-primary" data-translate="generate-btn">Generate Questions</button>
                </div>

                <!-- Player Selection -->
                <div id="player-selection" class="player-selection hidden">
                    <h3 data-translate="select-players">Select Active Players</h3>
                    <div class="car-seating-selection">
                        <div class="car-layout-selection">
                            <div class="seat-selection driver-seat" data-seat="driver">
                                <div class="seat-label">🚗 Driver</div>
                                <div class="player-selector">
                                    <select id="driver-player">
                                        <option value="">Select Player</option>
                                    </select>
                                    <label class="active-toggle">
                                        <input type="checkbox" id="driver-active" checked>
                                        <span class="toggle-label">Active</span>
                                    </label>
                                </div>
                            </div>
                            <div class="seat-selection front-passenger-seat" data-seat="front-passenger">
                                <div class="seat-label">👤 Front</div>
                                <div class="player-selector">
                                    <select id="front-passenger-player">
                                        <option value="">Select Player</option>
                                    </select>
                                    <label class="active-toggle">
                                        <input type="checkbox" id="front-passenger-active" checked>
                                        <span class="toggle-label">Active</span>
                                    </label>
                                </div>
                            </div>
                            <div class="seat-selection left-back-seat" data-seat="left-back">
                                <div class="seat-label">👤 Left Back</div>
                                <div class="player-selector">
                                    <select id="left-back-player">
                                        <option value="">Select Player</option>
                                    </select>
                                    <label class="active-toggle">
                                        <input type="checkbox" id="left-back-active" checked>
                                        <span class="toggle-label">Active</span>
                                    </label>
                                </div>
                            </div>
                            <div class="seat-selection right-back-seat" data-seat="right-back">
                                <div class="seat-label">👤 Right Back</div>
                                <div class="player-selector">
                                    <select id="right-back-player">
                                        <option value="">Select Player</option>
                                    </select>
                                    <label class="active-toggle">
                                        <input type="checkbox" id="right-back-active" checked>
                                        <span class="toggle-label">Active</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button id="start-game-btn" class="btn-primary" data-translate="start-game">Start Game</button>
                </div>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p data-translate="loading-text">Generating quiz questions...</p>
                </div>
            </div>
        </div>


        <!-- Game Page -->
        <div id="game-page" class="page">
            <div class="container">
                <div class="game-header">
                    <div class="car-seating">
                        <h3 data-translate="scoreboard">Scoreboard</h3>
                        <div class="car-layout">
                            <div class="car-seat driver-seat" data-seat="driver">
                                <div class="seat-label">🚗 Driver</div>
                                <div class="player-info" id="driver-player"></div>
                            </div>
                            <div class="car-seat front-passenger-seat" data-seat="front-passenger">
                                <div class="seat-label">👤 Front</div>
                                <div class="player-info" id="front-passenger-player"></div>
                            </div>
                            <div class="car-seat left-back-seat" data-seat="left-back">
                                <div class="seat-label">👤 Left Back</div>
                                <div class="player-info" id="left-back-player"></div>
                            </div>
                            <div class="car-seat right-back-seat" data-seat="right-back">
                                <div class="seat-label">👤 Right Back</div>
                                <div class="player-info" id="right-back-player"></div>
                            </div>
                        </div>
                    </div>
                    <div class="game-info">
                        <div id="current-player-indicator"></div>
                        <div id="question-counter"></div>
                    </div>
                </div>

                <div class="game-content">
                    <div id="question-container">
                        <h2 id="question-text"></h2>
                        
                        <!-- Player Numbers Area -->
                        <div id="player-numbers-area" class="player-numbers-container">
                            <h3 data-translate="drag-your-number">Drag your number to an answer:</h3>
                            <div id="player-numbers" class="player-numbers-grid"></div>
                        </div>
                        
                        <!-- Answer Options -->
                        <div id="answer-options" class="answer-grid"></div>
                        
                        <!-- Player Answer Indicators -->
                        <div id="player-answer-indicators" class="player-answer-indicators hidden">
                            <div class="answer-indicator driver-answer" id="driver-answer-indicator">
                                <div class="player-number">1</div>
                                <div class="answer-text"></div>
                            </div>
                            <div class="answer-indicator front-passenger-answer" id="front-passenger-answer-indicator">
                                <div class="player-number">2</div>
                                <div class="answer-text"></div>
                            </div>
                            <div class="answer-indicator left-back-answer" id="left-back-answer-indicator">
                                <div class="player-number">3</div>
                                <div class="answer-text"></div>
                            </div>
                            <div class="answer-indicator right-back-answer" id="right-back-answer-indicator">
                                <div class="player-number">4</div>
                                <div class="answer-text"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="answer-feedback" class="feedback hidden">
                    <div id="feedback-content"></div>
                </div>
            </div>
        </div>

        <!-- Game Finished Page -->
        <div id="game-finished" class="page">
            <div class="container">
                <h2 data-translate="game-finished">🎉 Game Finished!</h2>
                <div id="final-scores"></div>
                <div id="winner-announcement"></div>
                <button id="play-again-btn" class="btn-primary" data-translate="play-again">Play Again</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
