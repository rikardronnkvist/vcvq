<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coded Vibe Quiz (VCVQ)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Landing Page -->
        <div id="landing-page" class="page active">
            <div class="container">
                <header>
                    <h1 data-translate="app-title">🎯 Vibe Coded Vibe Quiz</h1>
                    <p class="subtitle" data-translate="app-subtitle">Real-time multiplayer quiz game</p>
                </header>
                
                <div class="language-selector">
                    <label for="language" data-translate="language-label">Language:</label>
                    <select id="language">
                        <option value="swedish">🇸🇪 Svenska</option>
                        <option value="english">🇬🇧 English</option>
                    </select>
                </div>

                <div class="quiz-setup">
                    <div class="topic-input">
                        <label for="topic" data-translate="topic-label">Choose a topic for your quiz:</label>
                        <input type="text" id="topic" data-translate-placeholder="topic-placeholder" placeholder="t.ex., Svensk historia, Rymdutforskning, Matlagning..." required>
                    </div>

                    <div class="game-settings">
                        <div class="setting-group">
                            <label for="player-count" data-translate="player-count-label">Number of players:</label>
                            <select id="player-count">
                                <option value="2" data-translate="2-players">2 Players</option>
                                <option value="3" data-translate="3-players">3 Players</option>
                                <option value="4" data-translate="4-players">4 Players</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label for="question-count" data-translate="question-count-label">Number of questions:</label>
                            <select id="question-count">
                                <option value="5" data-translate="5-questions">5 Questions</option>
                                <option value="10" selected data-translate="10-questions">10 Questions</option>
                                <option value="15" data-translate="15-questions">15 Questions</option>
                                <option value="20" data-translate="20-questions">20 Questions</option>
                                <option value="25" data-translate="25-questions">25 Questions</option>
                            </select>
                        </div>
                    </div>

                    <button id="generate-btn" class="btn-primary" data-translate="generate-btn">Generate Questions</button>
                </div>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p data-translate="loading-text">Generating quiz questions...</p>
                </div>
            </div>
        </div>


        <!-- Game Page -->
        <div id="game-page" class="page">
            <div class="container">
                <div class="game-header">
                    <div class="scores">
                        <h3 data-translate="scoreboard">Scoreboard</h3>
                        <div id="scoreboard"></div>
                    </div>
                    <div class="game-info">
                        <div id="current-player-indicator"></div>
                        <div id="question-counter"></div>
                    </div>
                </div>

                <div class="game-content">
                    <div id="question-container">
                        <h2 id="question-text"></h2>
                        <div id="answer-options" class="answer-grid"></div>
                    </div>
                </div>

                <div id="answer-feedback" class="feedback hidden">
                    <div id="feedback-content"></div>
                </div>
            </div>
        </div>

        <!-- Game Finished Page -->
        <div id="game-finished" class="page">
            <div class="container">
                <h2 data-translate="game-finished">🎉 Game Finished!</h2>
                <div id="final-scores"></div>
                <div id="winner-announcement"></div>
                <button id="play-again-btn" class="btn-primary" data-translate="play-again">Play Again</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
